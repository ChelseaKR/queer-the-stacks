name: Bug report
description: Report a reproducible defect in the dashboard, ingest pipeline, or recommender.
title: "bug: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Do not include reading-history exports, database files, auth tokens, or
        KOReader sync credentials. Security issues belong in a private advisory.
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the observed behavior and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: Provide sanitized steps or a synthetic fixture only.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version or commit
      placeholder: v0.1.0 or commit SHA
    validations:
      required: true
  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - Ingest and snapshots
        - Dashboard and authentication
        - Recommender and catalogs
        - Packaging and deployment
        - Documentation
    validations:
      required: true
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy check
      options:
        - label: I removed personal reading data, database files, credentials, and tokens.
          required: true

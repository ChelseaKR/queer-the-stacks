name: ci

# Mirrors QUALITY-AND-METRICS-STANDARD §"enforcement pipeline". Every stage is
# blocking; a merge to main requires this workflow green (branch protection, no
# admin bypass). `make verify` runs the same stages locally.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.14"

      - name: Set up Node (for the pa11y/axe a11y runner)
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"

      - name: Install project (dev + app extras)
        run: |
          python -m pip install --upgrade pip setuptools wheel
          # dev extra includes locust, used by the load-smoke gate below.
          python -m pip install -e ".[dev,app]"
          npm install -g pa11y

      # 1. format + lint (ruff, incl. bandit SAST subset)
      - name: Lint
        run: make lint PYTHON=python

      # 2. strict type-check
      - name: Type-check
        run: make typecheck PYTHON=python

      # 3. unit + integration tests + coverage gate (>=85%)
      - name: Tests
        run: make test PYTHON=python

      # 4. dependency vulnerability scan + secret scan (both merge-blocking).
      #    `make security` runs pip-audit and scripts/secret-scan.sh (gitleaks
      #    when present, else a high-signal grep fallback) — no GitHub API calls,
      #    so it works on a private repo without extra token permissions.
      - name: Security (deps + secrets)
        run: make security PYTHON=python

      # 5. accessibility — zero axe violations on the rendered dashboard
      - name: Accessibility
        run: make a11y PYTHON=python

      # 7. responsible-tech: offline eval must beat the popularity baseline
      - name: Eval
        run: make eval PYTHON=python

      # 6b. performance load smoke (merge-blocking): p95 < 500ms on the
      #     dashboard route. Boots the app in demo mode and drives it with a
      #     short, constant-load Locust scenario (locust ships via the `dev`
      #     extra installed above).
      - name: Performance load smoke
        run: make perf-load PYTHON=python

      # 6c. Lighthouse-CI (merge-blocking) against the built dashboard HTML.
      #     Chrome is preinstalled on ubuntu-latest runners; Node 20 is set up
      #     above.
      - name: Lighthouse CI
        run: make lighthouse PYTHON=python

      - name: Upload audit artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: audit-artifacts
          path: docs/audits/

name: scorecard

# OpenSSF Scorecard (SEC-36/37/38, CICD-03/11). Converts the four branch-
# protection/token-permission controls that are otherwise UNVERIFIED from the
# working tree (CQ-37/38/40/43, CICD-13-16) into a measured, dated score
# instead of a hand-audit of GitHub settings.
#
# `publish_results` is deliberately **false**: this repository is currently
# private, and Scorecard's publish path uploads results to the public OSSF
# dataset/API (api.securityscorecards.dev), which is meant for public repos.
# Publishing from a private repo would leak its security posture publicly.
# SARIF still uploads to this repo's own (private) code-scanning results.
# >>> If/when this repo goes public, flip `publish_results` to `true` to get
#     the public badge — that visibility change itself must be made
#     separately and deliberately (Settings → General → Danger Zone), not by
#     this workflow. <<<

on:
  branch_protection_rule:
  schedule:
    - cron: "24 4 * * 2" # weekly, Tuesday 04:24 UTC
  push:
    branches: [main]

permissions: read-all

concurrency:
  group: scorecard-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analysis:
    runs-on: ubuntu-latest
    permissions:
      security-events: write # upload SARIF to (private) code scanning
      id-token: write # sigstore-sign the results file
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Run analysis
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: false # see rationale above — private repo

      - name: Upload SARIF results
        uses: github/codeql-action/upload-sarif@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4.36.3
        with:
          sarif_file: results.sarif

      - name: Upload results as an artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: scorecard-results
          path: results.sarif
          retention-days: 30

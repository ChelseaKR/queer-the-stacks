name: zizmor

# Workflow-specific SAST (CICD-19, complements codeql.yml's `actions` language
# analysis with zizmor's GitHub-Actions-specific rule set: template-injection,
# credential persistence, excessive permissions, dangerous triggers). Scoped to
# PRs that actually touch workflow definitions. Zero High/Critical, blocking;
# lower-severity findings are reported but not gating (ratchet later).
#
# zizmor ships no dedicated Action — pinned via PyPI, matching the version
# verified locally before this gate went live (2026-07-05: 0 findings at
# --persona=regular, 1 low + 3 informational at --persona=pedantic).

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/**"

permissions:
  contents: read

concurrency:
  group: zizmor-${{ github.ref }}
  cancel-in-progress: true

jobs:
  zizmor:
    name: zizmor
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.x"

      - name: Install zizmor (pinned)
        run: python -m pip install --no-cache-dir zizmor==1.16.3

      - name: Run zizmor (block on High/Critical only)
        run: zizmor --min-severity=high .github/workflows/

name: codeql

# CodeQL SAST across the Python app and the GitHub Actions workflows themselves
# (SECURITY-AND-SUPPLY-CHAIN-STANDARD SEC-08, CI-CD-STANDARD CICD-19/20). Runs
# on every push and pull request to main plus a weekly schedule so newly
# disclosed query patterns are caught even without a code change. Code scanning
# is available because this is an open-source repository.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "19 4 * * 1"
  workflow_dispatch: {}
  schedule:
    - cron: '41 3 * * 3' # weekly — re-armed 2026-07-11 (metrics plan Phase 0.2)

permissions:
  contents: read

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      actions: read # required to analyze the `actions` language
      contents: read
      security-events: write # required to upload SARIF results
    strategy:
      fail-fast: false
      matrix:
        # `python` covers ingest/recommender/app + tests; `actions` audits the
        # workflow YAML itself (injection, permission scoping, dangerous
        # triggers) — complements the zizmor job in zizmor.yml.
        language: [python, actions]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4.36.3
        with:
          languages: ${{ matrix.language }}

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4.36.3
        with:
          category: "/language:${{ matrix.language }}"
          # No GHAS code scanning on this private repo — findings are checked in-run below.
          upload: never
          output: codeql-results

      - name: Fail on findings (no GHAS on this private repo; SARIF checked in-run)
        shell: bash
        run: |
          count=$(jq -s '[.[] | .runs[]?.results[]?] | length' codeql-results/*.sarif)
          echo "CodeQL findings: ${count}"
          if [ "${count:-0}" -gt 0 ]; then
            jq -r '.runs[]?.results[]? | "\(.ruleId // "rule"): \(.locations[0].physicalLocation.artifactLocation.uri // "?"):\(.locations[0].physicalLocation.region.startLine // 0)"' codeql-results/*.sarif
            exit 1
          fi
